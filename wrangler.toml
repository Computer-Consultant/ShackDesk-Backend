name = "shackdesk-telemetry"
main = "workers/telemetry/src/index.js"
compatibility_date = "2025-04-06"

# Routes — Cloudflare will serve this Worker at telemetry.shackdesk.com
# The DNS CNAME for telemetry.shackdesk.com must point to workers.dev (proxied via CF)
[[routes]]
pattern = "telemetry.shackdesk.com/report"
zone_name = "shackdesk.com"

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "shackdesk-telemetry"
database_id = "e77c8a3d-cba7-4326-846c-faeb2c585da0"
